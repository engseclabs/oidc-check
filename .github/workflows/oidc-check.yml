name: oidc-check

# Proves one student's OIDC trust policy works: request a GitHub OIDC token, try
# to assume oidc-lab-<handle>, and read the shared lab bucket. Success = that
# student's trust policy is correct.
#
# Triggered on demand with a single `handle` input. The Pages site dispatches
# this (via a minimal-scope token held off-page) when a student enters their
# handle, so no attendee list is ever stored in this public repo.

on:
  workflow_dispatch:
    inputs:
      handle:
        description: "Student handle (email local-part, lowercased)"
        required: true
        type: string

permissions:
  id-token: write # required to request the OIDC token
  contents: read

env:
  AWS_REGION: us-east-1
  LAB_BUCKET: authentication-training-lab-bucket

jobs:
  check:
    runs-on: ubuntu-latest
    # Fail fast: a wrong trust policy is the normal "red" state in this lab, and we
    # want the page to go red in seconds, not after minutes of retries. Cheap
    # backstop so a run can never hang.
    timeout-minutes: 3
    # The job name carries the handle so the Pages site can find this student's
    # result by name without parsing logs.
    name: "check (${{ inputs.handle }})"
    steps:
      - name: Assume oidc-lab-${{ inputs.handle }} over OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::857876979208:role/oidc-lab-${{ inputs.handle }}
          aws-region: ${{ env.AWS_REGION }}
          # Default is ~12 retries over ~2 min. One attempt = red shows fast; if a
          # student just edited their policy, they simply click Check again.
          retry-max-attempts: 1
      - name: Prove access by reading the lab bucket
        run: |
          aws sts get-caller-identity
          aws s3 ls "s3://${LAB_BUCKET}"
          aws s3 cp "s3://${LAB_BUCKET}/flag.txt" -
